name: Post Briefing to Slack

on:
  push:
    paths:
      - 'briefings/*.txt'
  workflow_dispatch:

jobs:
  post-to-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Post briefing to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD | grep '^briefings/' | head -n 1)
          if [ -z "$FILE" ]; then
            FILE=$(ls briefings/*.txt 2>/dev/null | sort | tail -n 1)
          fi
          echo "Posting file: $FILE"
          PAYLOAD=$(jq -n --arg text "$(printf '```\n%s\n```' "$(cat "$FILE")")" '{text: $text}')
          curl -s -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"
          echo "Done."
