name: Post Briefing to Slack

on:
  push:
    paths:
      - 'briefings/*.txt'

jobs:
  post-to-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Post briefing to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD | grep '^briefings/' | head -n 1)
          if [ -z "$FILE" ]; then
            echo "No briefing file found in diff, looking for latest..."
            FILE=$(ls briefings/*.txt 2>/dev/null | sort | tail -n 1)
          fi
          echo "Using file: $FILE"
          CONTENT=$(cat "$FILE")
          python3 -c "
import os, json, urllib.request
content = open('$FILE').read()
payload = json.dumps({'text': '\`\`\`' + content + '\`\`\`'}).encode()
req = urllib.request.Request(
    os.environ['SLACK_WEBHOOK_URL'],
    data=payload,
    headers={'Content-Type': 'application/json'}
)
urllib.request.urlopen(req)
print('Posted to Slack successfully.')
"
