name: Post Briefing to Slack

on:
  workflow_dispatch:
  push:
    paths:
      - "briefings/*.txt"
    branches:
      - main

jobs:
  post-to-slack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Post briefing to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ERROR_WEBHOOK_URL: ${{ secrets.SLACK_ERROR_WEBHOOK_URL }}
        run: |
          BRIEFING_FILE=$(git diff --name-only HEAD~1 HEAD -- "briefings/*.txt" | head -1)
          if [ -z "$BRIEFING_FILE" ]; then
            BRIEFING_FILE=$(ls briefings/*.txt | sort | tail -1)
          fi
          echo "Posting $BRIEFING_FILE to Slack"
          BRIEFING_FILE="$BRIEFING_FILE" python3 .github/scripts/post_to_slack.py
