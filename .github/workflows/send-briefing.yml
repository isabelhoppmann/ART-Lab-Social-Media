name: Send Daily Briefing Email
on:
  workflow_dispatch:
  push:
    paths:
      - 'briefings/*.txt'
    branches:
      - main

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send via Gmail API
        run: |
          FILE=$(ls -t briefings/*.txt | head -1)
          SUBJECT=$(head -1 "$FILE")
          HTML=$(python3 .github/scripts/convert_briefing.py "$FILE")

          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.GMAIL_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.GMAIL_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.GMAIL_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          {
            echo "From: Isabel Hoppmann <isabel@art-lab.ai>"
            echo "To: isabel@art-lab.ai, catie@art-lab.ai"
            echo "Subject: ${SUBJECT}"
            echo "MIME-Version: 1.0"
            echo "Content-Type: text/html; charset=UTF-8"
            echo ""
            printf '%s' "${HTML}"
          } > /tmp/email.txt

          ENCODED=$(base64 -w 0 /tmp/email.txt | tr '+/' '-_' | tr -d '=')

          RESULT=$(curl -s -X POST "https://gmail.googleapis.com/gmail/v1/users/me/messages/send" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"raw\": \"$ENCODED\"}")
          echo "$RESULT"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if 'id' in d else 1)"
