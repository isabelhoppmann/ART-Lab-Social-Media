name: Send Daily Briefing Email
on:
  push:
    paths:
      - 'briefings/*.txt'
    branches:
      - main

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send via Gmail API
        run: |
          FILE=$(ls -t briefings/*.txt | head -1)
          SUBJECT=$(head -1 "$FILE")
          BODY=$(tail -n +2 "$FILE")

          # Get access token
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.GMAIL_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.GMAIL_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.GMAIL_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Build RFC 2822 message
          RAW_MSG="From: Isabel Hoppmann <isabel@artlab.ai>
To: isabel@artlab.ai, catie@artlab.ai
Subject: ${SUBJECT}
MIME-Version: 1.0
Content-Type: text/plain; charset=UTF-8

${BODY}"

          # Base64url encode
          ENCODED=$(printf '%s' "$RAW_MSG" | base64 -w 0 | tr '+/' '-_' | tr -d '=')

          # Send via Gmail API
          RESULT=$(curl -s -X POST "https://gmail.googleapis.com/gmail/v1/users/me/messages/send" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"raw\": \"$ENCODED\"}")
          echo "$RESULT"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if 'id' in d else 1)"
