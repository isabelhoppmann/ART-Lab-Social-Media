name: Post Social Content to Slack

on:
  push:
    paths:
      - 'social/review-state.json'
  workflow_dispatch:

jobs:
  post-to-slack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # The cloud drafting agent runs in a network-restricted sandbox that blocks
      # the media CDNs (Pexels/Giphy/Tenor), so it ships memes as SKIPPED. This
      # runner has open internet, so we re-source + render any skipped memes here
      # before posting. No-op when the agent's memes came through fine.
      - name: Install ffmpeg + Pillow
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          python3 -m pip install --quiet Pillow
      - name: Regenerate skipped memes from Pexels
        env:
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
        run: python3 .github/scripts/regenerate_memes.py
      - name: Post to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python3 .github/scripts/post_social_to_slack.py
      - name: Commit regenerated assets + review-state.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/review-state.json posts/
          git diff --staged --quiet || git commit -m "chore: regenerate memes + update review-state"
          git push
