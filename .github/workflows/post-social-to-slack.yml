name: Post Social Content to Slack                                                
                                                            
  on:
    push:
      paths:
        - 'social/review-state.json'
    workflow_dispatch:                                                              
   
  jobs:                                                                             
    post-to-slack:                                          
      runs-on: ubuntu-latest
      permissions:
        contents: write                                                             
      steps:
        - name: Checkout                                                            
          uses: actions/checkout@v4                         
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
        - name: Post to Slack                                                       
          env:
            SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}                         
          run: python3 .github/scripts/post_social_to_slack.py
        - name: Commit updated review-state.json                                    
          run: |                                                                    
            git config user.name "github-actions[bot]"                              
            git config user.email "github-actions[bot]@users.noreply.github.com"    
            git add social/review-state.json                                        
            git diff --staged --quiet || git commit -m "chore: update review-state 
  with Slack thread ts"                                                             
            git push                                 
