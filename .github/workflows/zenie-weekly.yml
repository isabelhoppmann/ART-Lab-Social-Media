name: Zenie Weekly Diagnostics

on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyNaCl

      - name: Refresh Meta access token
        env:
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          FB_PAGE_ID: "227999857070404"
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: isabelhoppmann/ART-Lab-Social-Media
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.parse, json, os, time, base64
          from nacl import encoding, public

          token      = os.environ['PAGE_ACCESS_TOKEN']
          app_id     = os.environ['META_APP_ID']
          app_secret = os.environ['META_APP_SECRET']
          page_id    = os.environ['FB_PAGE_ID']
          gh_pat     = os.environ['GH_PAT']
          repo       = os.environ['REPO']

          def meta_get(url):
              req = urllib.request.Request(url, headers={"User-Agent": "ZenieAgent/1.0"})
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          def update_gh_secret(name, value):
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/actions/secrets/public-key",
                  headers={"Authorization": f"token {gh_pat}", "User-Agent": "ZenieAgent/1.0"}
              )
              with urllib.request.urlopen(req) as r:
                  key_data = json.load(r)
              pk  = public.PublicKey(key_data["key"].encode("utf-8"), encoding.Base64Encoder())
              enc = base64.b64encode(public.SealedBox(pk).encrypt(value.encode("utf-8"))).decode("utf-8")
              payload = json.dumps({"encrypted_value": enc, "key_id": key_data["key_id"]}).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/actions/secrets/{name}",
                  data=payload,
                  headers={"Authorization": f"token {gh_pat}", "Content-Type": "application/json", "User-Agent": "ZenieAgent/1.0"},
                  method="PUT"
              )
              with urllib.request.urlopen(req) as r:
                  return r.status

          app_token = f"{app_id}|{app_secret}"
          days_left = 9999
          try:
              d = meta_get(
                  f"https://graph.facebook.com/v21.0/debug_token"
                  f"?input_token={urllib.parse.quote(token)}"
                  f"&access_token={urllib.parse.quote(app_token)}"
              )['data']
              expires_at = d.get('expires_at', 0)
              days_left  = (expires_at - time.time()) / 86400 if expires_at else 9999
              print(f"Token valid={d.get('is_valid')}, expires_in={days_left:.0f}d")
          except Exception as e:
              print(f"Token check failed: {e}")

          try:
              r = meta_get(
                  f"https://graph.facebook.com/v21.0/oauth/access_token"
                  f"?grant_type=fb_exchange_token"
                  f"&client_id={urllib.parse.quote(app_id)}"
                  f"&client_secret={urllib.parse.quote(app_secret)}"
                  f"&fb_exchange_token={urllib.parse.quote(token)}"
              )
              long_lived = r["access_token"]
              try:
                  r2 = meta_get(
                      f"https://graph.facebook.com/v21.0/{page_id}"
                      f"?fields=access_token&access_token={urllib.parse.quote(long_lived)}"
                  )
                  new_token = r2.get("access_token", long_lived)
              except Exception:
                  new_token = long_lived
              status = update_gh_secret("PAGE_ACCESS_TOKEN", new_token)
              print(f"Token refreshed and secret updated (HTTP {status})")
              days_left = 9999
          except Exception as e:
              print(f"Token refresh skipped: {e}")

          if days_left < 30:
              with open('/tmp/needs_renewal.txt', 'w') as f:
                  f.write(f"{days_left:.0f}")
          PYEOF

      - name: Open renewal reminder if token expiring
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/needs_renewal.txt ]; then
            DAYS=$(cat /tmp/needs_renewal.txt)
            OPEN=$(gh issue list --label "token-renewal" --state open --json number --jq length 2>/dev/null || echo "0")
            if [ "$OPEN" = "0" ]; then
              if [ "$DAYS" = "EXPIRED" ]; then
                gh issue create \
                  --title "Action required: Meta API token is EXPIRED — Zenie report is empty" \
                  --label "token-renewal" \
                  --body "The PAGE_ACCESS_TOKEN is invalid (HTTP 400 on debug_token/refresh). The weekly diagnostics produced a report with no data. Generate a new token and update **both** the GitHub repo secret AND the routine environment (env_01YDbWNpQheRYhuBAE1dxE4q)."
              else
                gh issue create \
                  --title "Action required: Refresh Meta API token (expires in ${DAYS} days)" \
                  --label "token-renewal" \
                  --body "The PAGE_ACCESS_TOKEN for Zenie diagnostics expires in **${DAYS} days** and could not be auto-renewed. Please generate a new token and update the secret."
              fi
            fi
          fi

      - name: Run Zenie diagnostics
        env:
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          IG_USER_ID: "17841465217874624"
          FB_PAGE_ID: "227999857070404"
        run: python3 .github/scripts/zenie_diagnostics.py

      - name: Commit and push report
        run: |
          git config user.name  "Zenie Agent"
          git config user.email "zenie-agent@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Weekly diagnostics report $(date +%Y-%m-%d)"
          git push
